name: Deploy Android to Play Store

# ─── Triggers ───────────────────────────────────────────────────────────────
# • Push a tag like v1.0.3+17 → auto-deploy to the 'internal' track.
# • Go to Actions → "Deploy Android to Play Store" → Run workflow
#   to pick any track manually.
on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track to upload to'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
  push:
    tags:
      - 'v*'

# ─── Required GitHub Secrets ────────────────────────────────────────────────
# Add these in: Settings → Secrets and variables → Actions → New repository secret
#
# ANDROID_KEYSTORE_BASE64
#   The upload keystore encoded as base64.
#   On macOS/Linux:  base64 -w 0 android/app/upload-keystore.jks
#   On Windows:      [Convert]::ToBase64String([IO.File]::ReadAllBytes("android\app\upload-keystore.jks"))
#
# ANDROID_KEY_ALIAS        — keyAlias value from android/key.properties
# ANDROID_KEY_PASSWORD     — keyPassword value from android/key.properties
# ANDROID_STORE_PASSWORD   — storePassword value from android/key.properties
#
# GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
#   Full JSON content of the Google Cloud service-account key that has the
#   "Google Play Android Developer" role in Google Play Console.
#   How to create: https://docs.fastlane.tools/getting-started/android/setup/#setting-up-supply

jobs:
  deploy:
    name: Build & Deploy Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (matches build.gradle.kts compileOptions) ─────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter (same channel/version used locally) ────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable
          cache: true

      # ── 4. Restore keystore from secret ──────────────────────────────────────
      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      # ── 5. Write key.properties (consumed by build.gradle.kts) ───────────────
      #    storeFile is relative to the android/app/ module directory.
      - name: Create key.properties
        env:
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      # ── 6. Dart packages ──────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 7. Build signed release App Bundle ───────────────────────────────────
      - name: Build release AAB
        run: flutter build appbundle --release

      # ── 8. Upload to Google Play ─────────────────────────────────────────────
      #    On tag push the track defaults to 'internal'.
      #    On manual dispatch the chosen track is used.
      - name: Upload AAB to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.hallaqak.app
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          changesNotSentForReview: false
