name: Deploy Android to Play Store

# ─── Triggers ───────────────────────────────────────────────────────────────
# • Push a tag like v1.0.5+20 → auto-deploy to the 'internal' track.
# • Go to Actions → "Deploy Android to Play Store" → Run workflow manually.
on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track to upload to'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
  push:
    tags:
      - 'v*'

# ─── Required GitHub Secrets ────────────────────────────────────────────────
# ANDROID_KEYSTORE_BASE64
#   On Windows PowerShell:
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes("android\app\upload-keystore.jks")) | Set-Clipboard
#
# ANDROID_KEY_ALIAS        → upload
# ANDROID_KEY_PASSWORD     → 49504900
# ANDROID_STORE_PASSWORD   → 49504900
#
# GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
#   Full JSON of the Google Cloud service-account key (Play Android Developer role).

jobs:
  deploy:
    name: Build & Deploy Android via Fastlane
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ────────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable
          cache: true

      # ── 4. Ruby + Fastlane ────────────────────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          working-directory: android

      - name: Install Fastlane
        working-directory: android
        run: bundle install --jobs 4 --retry 3

      # ── 5. Restore keystore ───────────────────────────────────────────────────
      - name: Decode upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      # ── 6. Write key.properties ───────────────────────────────────────────────
      - name: Create key.properties
        env:
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF

      # ── 7. Dart packages ──────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 8. Build signed AAB ───────────────────────────────────────────────────
      - name: Build release AAB
        run: flutter build appbundle --release

      # ── 9. Fastlane → upload to Play Store ───────────────────────────────────
      - name: Upload to Play Store via Fastlane
        working-directory: android
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: bundle exec fastlane deploy track:${{ github.event.inputs.track || 'internal' }}

      # ── 10. Save AAB as GitHub artifact ──────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
