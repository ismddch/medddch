name: iOS Deploy to TestFlight

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy-ios:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: pod install --repo-update
        working-directory: ios

      - name: Build Flutter iOS (generates Xcode project files)
        run: flutter build ios --release --no-codesign

      - name: Install Distribution Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          rm profile.mobileprovision

      - name: Deploy via Fastlane
        working-directory: ios
        env:
          APPSTORE_KEY_ID:              ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID:           ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY:         ${{ secrets.APPSTORE_PRIVATE_KEY }}
          APP_IDENTIFIER:               ${{ secrets.APP_IDENTIFIER }}
          APPLE_ID_EMAIL:               ${{ secrets.APPLE_ID_EMAIL }}
          TEAM_ID:                      ${{ secrets.TEAM_ID }}
          PROVISIONING_PROFILE_NAME:    ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: bundle exec fastlane beta
