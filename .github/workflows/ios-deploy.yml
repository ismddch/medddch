name: iOS Deploy to TestFlight

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy-ios:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Xcode ─────────────────────────────────────────────────────────────
      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Ruby + Gems ───────────────────────────────────────────────────────
      - name: Setup Ruby & install gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios

      # ── 5. Dart packages ─────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 6. Disable Swift Package Manager ─────────────────────────────────────
      # SPM rewrites project.pbxproj during `flutter build ios` and clears any
      # DEVELOPMENT_TEAM set beforehand, causing the build to fail even with
      # --no-codesign. This project uses CocoaPods so SPM is not needed.
      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      # ── 7. Inject DEVELOPMENT_TEAM (safety net for Xcode signing resolver) ───
      - name: Inject DEVELOPMENT_TEAM into project
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          python3 - <<'PYEOF'
          import re, os
          team_id = os.environ["TEAM_ID"]
          pbxproj = "ios/Runner.xcodeproj/project.pbxproj"
          with open(pbxproj) as f:
              content = f.read()
          patched = re.sub(
              r'DEVELOPMENT_TEAM = [^;]*;',
              f'DEVELOPMENT_TEAM = "{team_id}";',
              content,
          )
          with open(pbxproj, "w") as f:
              f.write(patched)
          count = patched.count(f'DEVELOPMENT_TEAM = "{team_id}";')
          print(f"Injected DEVELOPMENT_TEAM={team_id} in {count} place(s)")
          PYEOF

      # ── 8. CocoaPods ─────────────────────────────────────────────────────────
      - name: Install CocoaPods dependencies
        working-directory: ios
        run: bundle exec pod install --repo-update

      # ── 9. Flutter build (no codesign — Fastlane signs the archive) ──────────
      - name: Build Flutter iOS release
        run: flutter build ios --release --no-codesign

      # ── 10. Keychain + distribution certificate ───────────────────────────────
      - name: Create keychain and import distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      # ── 11. Provisioning profile ──────────────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > /tmp/profile.mobileprovision

          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision

          rm /tmp/profile.mobileprovision /tmp/profile.plist

      # ── 12. App Store Connect API key ─────────────────────────────────────────
      - name: Write App Store Connect API key
        env:
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: printf '%s' "$APPSTORE_PRIVATE_KEY" > /tmp/AuthKey.p8

      # ── 13. Fastlane: archive + sign + upload to TestFlight ──────────────────
      - name: Deploy via Fastlane
        working-directory: ios
        env:
          APPSTORE_KEY_ID:           ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID:        ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_IDENTIFIER:            ${{ secrets.APP_IDENTIFIER }}
          APPLE_ID_EMAIL:            ${{ secrets.APPLE_ID_EMAIL }}
          TEAM_ID:                   ${{ secrets.TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: bundle exec fastlane beta
