name: iOS → TestFlight

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 90

    steps:

      # ── 1. Code ───────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Xcode ──────────────────────────────────────────────────────────────
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # ── 3. Flutter ────────────────────────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Ruby 3.3 ──────────────────────────────────────────────────────────
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Verify Ruby version
        run: ruby --version

      # ── 5. Install Fastlane + CocoaPods ──────────────────────────────────────
      - name: Install gems
        working-directory: ios
        run: |
          gem install bundler --no-document
          bundle install --jobs 4 --retry 3

      # ── 6. Dart packages ──────────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 7. CocoaPods ──────────────────────────────────────────────────────────
      - name: Pod install
        working-directory: ios
        run: bundle exec pod install --repo-update

      # ── 8. Flutter iOS build (no signing — Fastlane signs) ───────────────────
      - name: flutter build ios --release --no-codesign
        run: flutter build ios --release --no-codesign

      # ── 9. Distribution certificate → keychain ────────────────────────────────
      - name: Import certificate
        env:
          CERT_B64:  ${{ secrets.DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          CERT_PASS: ${{ secrets.CERTIFICATE_PASSWORD }}
          KC_PASS:   ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KC_PASS" ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain  -p "$KC_PASS" ci.keychain
          security set-keychain-settings -t 7200 -u ci.keychain

          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k ci.keychain \
            -P "$CERT_PASS" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "$KC_PASS" ci.keychain
          rm /tmp/cert.p12

      # ── 10. Provisioning profile ──────────────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_B64" | base64 --decode > /tmp/pp.mobileprovision
          security cms -D -i /tmp/pp.mobileprovision > /tmp/pp.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/pp.plist)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/pp.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          rm /tmp/pp.mobileprovision /tmp/pp.plist
          echo "Profile $UUID installed"

      # ── 11. App Store Connect API key ─────────────────────────────────────────
      - name: Write AuthKey.p8
        env:
          KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: printf '%s' "$KEY" > /tmp/AuthKey.p8

      # ── 12. Fastlane: archive + sign + upload ─────────────────────────────────
      - name: Fastlane beta
        working-directory: ios
        env:
          APPSTORE_KEY_ID:           ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID:        ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_IDENTIFIER:            ${{ secrets.APP_IDENTIFIER }}
          TEAM_ID:                   ${{ secrets.TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          FASTLANE_HIDE_CHANGELOG:   "1"
        run: bundle exec fastlane beta 2>&1 | tee /tmp/fl.log; exit ${PIPESTATUS[0]}

      # ── 13. Show error details on failure ────────────────────────────────────
      - name: Show Fastlane log
        if: failure()
        run: tail -200 /tmp/fl.log 2>/dev/null || true

      # ── 14. Cleanup ───────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/AuthKey.p8
          security delete-keychain ci.keychain 2>/dev/null || true
