name: iOS → TestFlight

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 90

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Ruby 3.3 (fix for Fastlane deprecation warning) ───────────────────────
      - name: Setup Ruby 3.3
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Fastlane & CocoaPods
        working-directory: ios
        run: |
          gem install bundler --no-document
          bundle install --jobs 4 --retry 3

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        working-directory: ios
        run: bundle exec pod install --repo-update

      # ── Set DEVELOPMENT_TEAM before flutter build (required by Xcode SPM) ─────
      - name: Inject Development Team
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          perl -i -pe \
            "s/DEVELOPMENT_TEAM = [^;]*/DEVELOPMENT_TEAM = $TEAM_ID/g" \
            ios/Runner.xcodeproj/project.pbxproj

      - name: Flutter build iOS
        run: flutter build ios --release --no-codesign

      # ── Import Distribution Certificate ───────────────────────────────────────
      - name: Import certificate
        env:
          CERT_B64:  ${{ secrets.DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          CERT_PASS: ${{ secrets.CERTIFICATE_PASSWORD }}
          KC_PASS:   ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KC_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain  -p "$KC_PASS" build.keychain
          security set-keychain-settings -t 7200 -u build.keychain

          echo "$CERT_B64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$CERT_PASS" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KC_PASS" build.keychain
          rm /tmp/cert.p12

      # ── Install Provisioning Profile ──────────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$PROFILE_B64" | base64 --decode > /tmp/profile.mobileprovision
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/profile.plist)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          rm /tmp/profile.mobileprovision /tmp/profile.plist

      # ── App Store Connect API key ──────────────────────────────────────────────
      - name: Write AuthKey.p8
        env:
          KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: printf '%s' "$KEY" > /tmp/AuthKey.p8

      # ── Fastlane: archive + sign + upload to TestFlight ───────────────────────
      - name: Fastlane beta
        working-directory: ios
        env:
          APPSTORE_KEY_ID:           ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID:        ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_IDENTIFIER:            ${{ secrets.APP_IDENTIFIER }}
          TEAM_ID:                   ${{ secrets.TEAM_ID }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          FASTLANE_HIDE_CHANGELOG:   "1"
        run: bundle exec fastlane beta 2>&1 | tee /tmp/fl.log; exit ${PIPESTATUS[0]}

      # ── Print full log if upload fails ─────────────────────────────────────────
      - name: Show error log
        if: failure()
        run: tail -300 /tmp/fl.log 2>/dev/null || true

      # ── Cleanup ────────────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/AuthKey.p8
          security delete-keychain build.keychain 2>/dev/null || true
