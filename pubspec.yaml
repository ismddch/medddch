name: barbershop_queue
description: A barbershop queue booking mobile app with Supabase backend.
publish_to: 'none'
version: 1.0.10+28

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.3.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  intl: ^0.20.2
  rename: ^3.1.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.0
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  rename_app: ^1.6.5

  

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0D2B"
  adaptive_icon_foreground: "assets/icon.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

