name: barbershop_queue
description: A barbershop queue booking mobile app with Supabase backend.
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.3.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  image_picker: ^1.0.7
  intl: ^0.20.2
  rename: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

  

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.jpeg" # Chemin vers votre image
  min_sdk_android: 21 # Optionnel

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

